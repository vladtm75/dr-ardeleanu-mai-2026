*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Poppins',sans-serif;background:linear-gradient(150deg,#8f261d 0%,#7B1C16 45%,#4e0f0a 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#F5EDE3;border-radius:20px;padding:44px 42px 34px;max-width:420px;width:100%;box-shadow:0 18px 60px rgba(0,0,0,.45);text-align:center;border-top:6px solid #C9A227;}
.card img{width:250px;max-width:80%;margin-bottom:24px;}

.sub{font-size:11.5px;font-weight:400;color:#8a8172;margin:6px 0 24px;}

button{width:100%;height:46px;margin-top:12px;border:none;border-radius:12px;cursor:pointer;background:#7B1C16;color:#fff;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;transition:background .15s;}
button:hover{background:#5e130e;}
button:disabled{opacity:.6;cursor:wait;}
.remember{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:14px;font-size:11px;color:#8a8172;}
.err{color:#c0392b;font-size:11.5px;margin-top:12px;min-height:16px;font-weight:500;}
.foot{margin-top:22px;font-size:8.5px;font-weight:500;letter-spacing:2.4px;color:#C9A227;}
.shake{animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}

const KEYNAME='da-mai2026-key';
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function tryUnlock(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(ENC.salt),iterations:310000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ENC.iv)},key,b64d(ENC.ct));
  return new TextDecoder().decode(pt);
}
async function go(){
  const pw=document.getElementById('pw').value;
  if(!pw) return;
  const btn=document.getElementById('go');
  btn.disabled=true; document.getElementById('err').textContent='';
  try{
    const html=await tryUnlock(pw);
    if(document.getElementById('remember').checked) localStorage.setItem(KEYNAME, btoa(unescape(encodeURIComponent(pw))));
    document.open(); document.write(html); document.close();
  }catch(e){
    btn.disabled=false;
    document.getElementById('err').textContent='Parolă incorectă — încearcă din nou.';
    const c=document.getElementById('card'); c.classList.remove('shake'); void c.offsetWidth; c.classList.add('shake');
    localStorage.removeItem(KEYNAME);
  }
}
document.getElementById('go').addEventListener('click',go);
document.getElementById('pw').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
(async()=>{
  const saved=localStorage.getItem(KEYNAME);
  if(!saved) return;
  try{
    const pw=decodeURIComponent(escape(atob(saved)));
    const html=await tryUnlock(pw);
    document.open(); document.write(html); document.close();
  }catch(e){ localStorage.removeItem(KEYNAME); }
})();
</script>
